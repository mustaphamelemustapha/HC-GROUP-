services:
  - type: web
    name: hc-group-backend
    env: node
    buildCommand: npm install --prefix backend
    startCommand: npm start --prefix backend
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: /var/data/sqlite/market.db
    disk:
      name: sqlite-data
      mountPath: /var/data/sqlite
      sizeGB: 1
