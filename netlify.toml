[build]
  command = "npm install --prefix frontend && npm run build --prefix frontend"
  publish = "frontend/dist"

# Redirect API calls to the Render Backend
[[redirects]]
  from = "/api/*"
  # TODO: Replace this URL with your actual Render URL after deploying the backend
  to = "https://hc-group-backend.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
